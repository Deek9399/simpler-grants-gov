services:

  grants-management-api:
    build:
      context: .
      target: dev
      args:
        - RUN_UID=${RUN_UID:-4000}
        - RUN_USER=${RUN_USER:-api}
    command:
      [
        "flask", "--app", "src.app", "run", "--host", "0.0.0.0", "--port", "8089", "--reload"
      ]
    container_name: grants-management-api
    env_file:
      - path: ./local.env
        required: true
      - path: ./override.env
        required: false
    depends_on:
      - mock-oauth2-server
    ports:
      - 8089:8089
    volumes:
      - .:/grants_management_api
    networks:
      - local_db
      - default

  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:2.3.0
    ports:
      - "5008:5008"
    environment:
      LOG_LEVEL: "debug"
      SERVER_PORT: 5008
      JSON_CONFIG_PATH: /app/config.json
    networks:
      - default
    volumes:
      - ./mock-oauth/config.json:/app/config.json
      - ./mock-oauth/mock-server-key.json:/app/resources/mock-oauth2-server-keys.json


networks:
  local_db:
    # NOTE: This network is created by starting the shared DB
    # defined in /backend/docker-compose.db.yml
    external: true
    name: local_db
